<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>무선국 원격검침시설 유지보수 자체사업 현황</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <h1>무선국 원격검침시설 유지보수 자체사업 현황</h1>

  <nav>
    <button>작업현황</button>
    <button>수입/지출 현황</button>
    <button>유지보수 단가표 모음</button>
    <button>지출관리</button>
  </nav>

  <section>
    <h2>작업현황</h2>

    <div class="cards">
      <div class="card">
        <span>전체신청건수</span>
        <strong id="totalCount">0</strong>
      </div>
      <div class="card">
        <span>보완건수</span>
        <strong id="supplementCount">0</strong>
      </div>
      <div class="card">
        <span>완료건수</span>
        <strong id="completeCount">0</strong>
      </div>
    </div>
  </section>

  <script src="/app.js"></script>
</body>
</html>
